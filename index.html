<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FoundrHUB — Discover the Next Big Homegrown Brands in Your City</title>
  <meta name="description" content="A curated startup discovery OS for visionary founders, rising D2C brands, and verified local innovators. Explore, get verified, and launch on FoundrHUB." />

  <!-- Fonts: Playfair Display (editorial serif) + Inter (clean sans) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS v3 CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['"Playfair Display"', 'Georgia', 'serif'],
            sans: ['"Inter"', 'system-ui', 'sans-serif'],
          },
          colors: {
            beige: { 50: '#faf8f5', 100: '#f5f0e8', 200: '#ede5d5' },
            neutral: { 850: '#1a1a1a', 950: '#0a0a0a' },
          },
          borderRadius: { '2xl': '1rem', '3xl': '1.5rem' },
        },
      },
    }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #ffffff;
      color: #0a0a0a;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Scroll reveal */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.9s cubic-bezier(0.16,1,0.3,1), transform 0.9s cubic-bezier(0.16,1,0.3,1);
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* Animations */
    @keyframes fadeInUp { 0% { opacity:0; transform:translateY(24px); } 100% { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
    @keyframes ping { 75%,100% { transform:scale(2); opacity:0; } }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d1d1; border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: #aaa; }
  </style>

  <!-- React 18 + Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Component files (loaded in dependency order) -->
  <script type="text/babel" src="src/shared.jsx"></script>
  <script type="text/babel" src="src/auth.jsx"></script>
  <script type="text/babel" src="src/founder.jsx"></script>
  <script type="text/babel" src="src/user.jsx"></script>
  <script type="text/babel" src="src/homepage.jsx"></script>
  <script type="text/babel" src="src/homepage-bottom.jsx"></script>

  <script type="text/babel">
    /* ═══════════════════════════════════════════════════════════
       APP — Root component with Auth + Router
       ═══════════════════════════════════════════════════════════ */
    const App = () => {
      const [user, setUser] = React.useState(null);

      const logout = React.useCallback(() => {
        setUser(null);
        window.location.hash = '/';
      }, []);

      return (
        <AuthContext.Provider value={{ user, setUser, logout }}>
          <RouterProvider>
            <AppRouter />
          </RouterProvider>
        </AuthContext.Provider>
      );
    };

    const AppRouter = () => {
      const { route } = useRoute();

      React.useEffect(() => {
        window.scrollTo(0, 0);
        const timer = setTimeout(() => {
          const observer = new IntersectionObserver(
            (entries) => { entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }); },
            { threshold: 0.08, rootMargin: '0px 0px -40px 0px' }
          );
          document.querySelectorAll('.reveal:not(.visible)').forEach(el => observer.observe(el));
          return () => observer.disconnect();
        }, 150);
        return () => clearTimeout(timer);
      }, [route]);

      switch (route) {
        case '/signin':            return <SignInPage />;
        case '/signup':             return <SignUpPage />;
        case '/role-selection':     return <RoleSelectionPage />;
        case '/founder-onboarding': return <FounderOnboarding />;
        case '/user-onboarding':    return <UserOnboarding />;
        case '/founder-dashboard':  return <FounderDashboard />;
        case '/user-dashboard':     return <UserDashboard />;
        default:                    return <HomePage />;
      }
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
